# ② بوابة CI (خطة إصلاح التدقيق 2026-07-12): تشغيل سويّة الاختبارات كاملة على كل
# دفع/PR — كانت السويّة (600+ فحص، تخرج بكود 1 عند أي فشل) لا يشغّلها أي شيء آليًّا
# (433 كوميت لـmain في 8 أسابيع بلا حارس). البوابة = «خروج 0»، لا عدد مقتبس.
name: Tests
permissions:
  contents: read
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # نفس نسخة الإنتاج (daily_screener.yml)
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      # السويّة تعمل بلا إنترنت بتصميمها (كل الجالبات محقونة/مقلَّدة) — أي فشل هنا
      # فشل حقيقي في المنطق، لا عطل شبكة.
      - name: Run full test suite
        run: python3 test_bot.py
