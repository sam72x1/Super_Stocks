name: CE Probe (مؤقت — فحص chartexchange من بيئة Actions)
# 🔬 مجسّ مؤقت يُحذف بعد القراءة: هل chartexchange.com يستجيب لبيئة GitHub Actions
# (المصادر تُحجب عن بيئات التطوير — الدليل يُؤخذ من بيئة البوت الحقيقية)؟
# يطبع رموز HTTP + مقتطفات الاقتراض/الشورت لكتابة محلّل صحيح غير مُخمَّن.
permissions:
  contents: read
on:
  workflow_dispatch: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe pages
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for u in \
            "https://chartexchange.com/symbol/nasdaq-geos/borrow-fee/" \
            "https://chartexchange.com/symbol/nasdaq-geos/short-volume/" \
            "https://chartexchange.com/symbol/nasdaq-geos/" \
            "https://chartexchange.com/api/v1/docs/" ; do
            echo "===== $u"
            code=$(curl -sS -m 20 -A "$UA" -o /tmp/page.html -w "%{http_code}" "$u" || echo "ERR")
            size=$(wc -c < /tmp/page.html 2>/dev/null || echo 0)
            echo "HTTP $code · $size bytes"
            if [ "$code" = "200" ]; then
              echo "--- مقتطفات (borrow/CTB/short/available) ---"
              grep -oiE '.{80}(borrow|CTB|cost to|short (vol|int)|available).{160}' /tmp/page.html | head -15
              echo "--- JSON داخلي؟ ---"
              grep -oE '"(fee|borrow[A-Za-z]*|available|shortVolume[A-Za-z]*)"[: ]*"?[0-9.,%]+"?' /tmp/page.html | head -15
            else
              head -c 400 /tmp/page.html 2>/dev/null; echo
            fi
          done
