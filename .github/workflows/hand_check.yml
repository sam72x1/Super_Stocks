name: Hand Check (فحص اليد)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: الرمز المراد فحصه (مثل VFF) — هل وراءه مضارب؟
        required: true
        type: string

jobs:
  hand-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hand check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HAND_CHECK: ${{ github.event.inputs.ticker }}
        run: python hand_check.py
