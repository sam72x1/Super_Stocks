name: Ignition Radar (رادار الانطلاق اللحظي)

# 🔥 عامل جلسة حي: من الافتتاح، يلفّ كل ~45ث يفحص القائمة المؤهّلة ويكشف لحظة
# الاشتعال (حجم + كسر صاعد + تدفق أوامر يؤكّد) → تنبيه فوري «ادخل الآن». جوب واحد
# طويل (لا كرون كل دقيقة). إشعار فقط — لا يحفظ حالة الفرز (عدا سجلّ القياس المستقل
# ignition_log.json بنهاية الجلسة). فاشل-آمن: بلا مفتاح = لا عمل.

# contents: write ليحفظ عامل الجلسة سجلّ القياس (ignition_log.json) بالريبو عند النهاية
permissions:
  contents: write

on:
  schedule:
    - cron: "35 13 * * 1-5"        # بعد افتتاح ناسداك (13:30 UTC) مباشرةً، أيام التداول
  workflow_dispatch: {}

# مجموعة تزامن مستقلة (لا يحفظ الحالة → يعمل بالتوازي مع الفرز/المراقبة بلا تضارب)
concurrency:
  group: super-stocks-ignition
  cancel-in-progress: false

jobs:
  ignition:
    runs-on: ubuntu-latest
    timeout-minutes: 350            # ≈ من 13:35 إلى ~19:25 UTC (يغطّي الافتتاح + معظم الجلسة)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ignition radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          IGNITION_END_UTC: "19:20"   # يخرج بأمان قبل حدّ الجوب (350د)
          # 🔬 E2-A: يفعّل المسجّل الظلّي فقط (لا يغيّر أي تنبيه/عتبة/اختيار). GITHUB_SHA/RUN_ID/
          # RUN_ATTEMPT يوفّرها Actions تلقائيًّا فيقرؤها المسجّل للـprovenance.
          E2_MEASUREMENT: "1"
        run: python ignition_live.py

      # 🔬 E2-A: بيئة القياس (provenance) + رفع الخام artifact دائمًا (حتى عند timeout/فشل).
      - name: Capture E2 environment (provenance)
        if: always()
        run: |
          mkdir -p e2_measurement
          { python -VV; echo "---pip freeze---"; pip freeze; } \
            > "e2_measurement/env_${{ github.run_id }}.txt" 2>&1 || true

      - name: Upload E2 measurement
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ignition-e2-${{ github.run_id }}
          path: e2_measurement/
          retention-days: 90
          if-no-files-found: warn
