name: Daily Pivot Screener
permissions:
  contents: write
concurrency:
  # مجموعة مشتركة مع pullback_monitor: كلاهما يكتب weekly_watchlist.json،
  # فلا يعملان متزامنَين (يمنع تضارب git_save وفقدان حالة «triggered»).
  group: super-stocks-state
  cancel-in-progress: false
on:
  schedule:
    # متابعة يومية: الثلاثاء→الجمعة 07:00 UTC (تقرأ إغلاق الاثنين→الخميس).
    - cron: "0 7 * * 2-5"
    # 🔄 التجديد الأسبوعي: الجمعة 22:00 UTC = بعد إغلاق السوق الأمريكي
    #    (20:00 صيفًا / 21:00 شتاءً UTC) → شمعة أسبوعية مكتملة (اثنين→جمعة).
    #    ⚠️ لو غيّرت هذا الوقت، غيّر مطابقته في RENEW_ON_CLOSE أدناه.
    - cron: "0 22 * * 5"
  workflow_dispatch:
    inputs:
      force_renew:
        description: "إعادة بناء القائمة كاملة على آخر كود (1=نعم)"
        required: false
        default: "0"
jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCREENER_MODE: FULL
          FORCE_RENEW: ${{ github.event.inputs.force_renew }}
          # 🔄 إشارة التجديد الأسبوعي: تُرفع فقط في جوب كرون الجمعة 22:00 UTC
          #    (بعد إغلاق السوق). أي تشغيل آخر (متابعة يومية/يدوي) = 0.
          RENEW_ON_CLOSE: ${{ github.event.schedule == '0 22 * * 5' && '1' || '0' }}
        run: python Super_stock.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-report
          path: screener_report_*.csv
          if-no-files-found: ignore
