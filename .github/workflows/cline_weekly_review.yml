name: Cline Weekly Auditor

# مراجِع مستقل أسبوعي يدقّق البوت نفسه — انظر CLINE_WEEKLY_REVIEW.md (عقل الوكيل).
# آمن بالتصميم: تشغيل يدوي فقط الآن (workflow_dispatch). فعّل الجدولة (cron) بعد
# أول تشغيل ناجح + تأكيد صيغة استدعاء Cline. PR فقط — لا دمج تلقائي (قرار المستخدم).
#
# قبل أول تشغيل (يفعلها المستخدم في GitHub):
#   1) أضِف سرّ CLINE_API_KEY (Settings → Secrets and variables → Actions).
#      ⚠️ استخدم مفتاحًا **جديدًا** (المفتاح المُشارَك بالمحادثة يُعتبر مُخترَقًا).
#   2) ادمج هذا الملف في main (الـActions تُشغَّل من main).
#   3) أكّد سطر استدعاء Cline أدناه (شغّل «cline --help» — الصيغة قد تختلف).

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 8 * * 5"   # الجمعة 08:00 UTC (بعد تقرير أداة التطوير) — فعّله لاحقًا

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: سحب المستودع (كل تاريخ git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: تهيئة Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: المتطلبات + بوابة الاختبارات (لازم تنجح قبل المراجعة)
        run: |
          pip install -r requirements.txt || true
          python3 test_bot.py

      - name: تثبيت Cline
        run: npm install -g cline

      - name: المراجعة الأسبوعية المستقلة (Cline)
        env:
          CLINE_API_KEY: ${{ secrets.CLINE_API_KEY }}   # سرّ — لا قيمة هنا
        run: |
          # الصيغة الصحيحة (Cline CLI 2.0): البرومبت positional + «-y» تشغيل ذاتي
          # كامل بلا واجهة تفاعلية (يبثّ لـstdout). النموذج = افتراضي حساب Cline Pass.
          DATE=$(date +%F)
          mkdir -p reports
          cline -y "نفّذ CLINE_WEEKLY_REVIEW.md **باقتصاد صارم في القراءة** (التوكنز مكلفة): ركّز على (1) **git diff منذ آخر مراجعة** لمعرفة ما تغيّر، (2) ملفات البيانات: weekly_watchlist.json · alerts_history.json · ملفات CSV · PENDING_VERIFICATION.md. **لا تُعِد قراءة كامل Super_stock.py ولا ملفات المنهجية** — اقرأ المقاطع المعنية فقط (بـgrep ثم قراءة نطاق محدود) عند التحقق من شيء بعينه. اكتب التقرير في reports/cline_weekly_${DATE}.md وحدّث PENDING_VERIFICATION.md (احسم المحسوم وأبقِ المعلّق). لا تلمس جذور الفرز/الدخول/الوقف/الأهداف بلا توثيق. شغّل python3 test_bot.py وتأكّد نجاحها قبل الانتهاء."

      - name: فتح PR بالتقرير + التحديثات (مراجعة فقط — لا دمج)
        # لا يُفشل الـworkflow لو منع GitHub إنشاء PR (إعداد Settings→Actions مغلق):
        # peter-evans يدفع الفرع أولًا (فالتقرير يُحفظ)، وفشل خطوة الـPR لا يُحمّر التشغيل.
        # متى فُعّل الإعداد، يفتح الـPR تلقائيًا بلا أي تغيير آخر.
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cline/weekly-review
          title: "🔬 مراجعة Cline الأسبوعية المستقلة"
          commit-message: "مراجعة Cline الأسبوعية المستقلة (GLM-5.2)"
          body: |
            تقرير تدقيق مستقل من وكيل **Cline (GLM-5.2)** حسب `CLINE_WEEKLY_REVIEW.md`.
            **مراجعة فقط — لا دمج للجذور بلا موافقة بشرية.** راجع `reports/`.
          labels: cline-audit
