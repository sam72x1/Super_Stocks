name: مراقبة الارتداد اللحظية

on:
  schedule:
    # كل 30 دقيقة أثناء ساعات السوق الأمريكي (تقريبًا 13:00–21:00 UTC) أيام التداول
    - cron: "*/30 13-21 * * 1-5"
  workflow_dispatch: {}

# مجموعة تزامن مشتركة مع daily_screener: كلاهما يكتب weekly_watchlist.json،
# فلا يعملان متزامنَين (يمنع تضارب git_save وفقدان حالة «triggered»).
concurrency:
  group: super-stocks-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Monitor pullback list
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pullback_live.py
