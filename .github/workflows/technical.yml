name: تقرير فني كلاسيكي (يدوي)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "رمز السهم المراد تحليله (مثل: VOR أو BBLG أو PRFX)"
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run classical technical report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKER: ${{ github.event.inputs.ticker }}
        run: python technical_report.py
