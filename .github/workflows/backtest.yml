name: Backtest (historical)
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "رموز مفصولة بفاصلة (مثال: NGEN,SMX,VEEE) — للحُكم الحقيقي وسّع العيّنة"
        required: true
        default: ""
      bt_base_range_max:
        description: "تجربة B1 (اختياري): تجاوز BASE_RANGE_MAX_PCT — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_min_drop_floor:
        description: "تجربة B1 (اختياري): تجاوز MIN_DROP_FLOOR — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCREENER_MODE: BACKTEST
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols }}
          # B1: مفاتيح تجربة A/B — تُقرأ في وضع BACKTEST حصريًا (الإنتاج محصّن بقفل اختبار)
          BT_BASE_RANGE_MAX: ${{ github.event.inputs.bt_base_range_max }}
          BT_MIN_DROP_FLOOR: ${{ github.event.inputs.bt_min_drop_floor }}
        run: python Super_stock.py
      - name: Upload backtest CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_*.csv
          if-no-files-found: ignore
