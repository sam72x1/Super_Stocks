name: Backtest (historical)
permissions:
  contents: read
  actions: read          # 🕰️ لتحميل لقطة التجميد من تشغيلة freeze (frozen_run_id)
on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "رموز مفصولة بفاصلة (مثال: NGEN,SMX,VEEE). **فارغ = امسح السوق الكامل (ناسداك)** لأسهم الارتكاز وشوف اللي انفجر واللي لا — بلا انحياز اختيار"
        required: false
        default: ""
      month:
        description: "الشهر (اختياري): **1-12 فقط** (1=يناير … 12=ديسمبر). ⚠️ للسنة كاملة اكتب السنة في خانة «السنة» تحت لا هنا (لو كتبت سنة هنا بالغلط مثل 2025 يصلّحها تلقائيًا = السنة كاملة). فارغ + سوق كامل = أحدث شهر نافذته مكتملة. مع رموز محدّدة = يقصرها على الشهر"
        required: false
        default: ""
      year:
        description: "السنة (اختياري): مثال 2025. **مع ترك الشهر فارغًا = يمسح السنة كاملة (كل الأشهر) بتشغيل واحد.** مع شهر محدّد = ذلك الشهر من تلك السنة. فارغ = أحدث سنة"
        required: false
        default: ""
      bt_base_range_max:
        description: "تجربة B1 (اختياري): تجاوز BASE_RANGE_MAX_PCT — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_min_drop_floor:
        description: "تجربة B1 (اختياري): تجاوز MIN_DROP_FLOOR — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_max_drop_pct:
        description: "تجربة C (اختياري): تجاوز سقف الانهيار MAX_DROP_PCT (97) — باكتيست فقط"
        required: false
        default: ""
      bt_spike_window:
        description: "تجربة C (اختياري): تجاوز نافذة سرعة الانفجار PRIOR_SPIKE_WINDOW (20ج) — باكتيست فقط"
        required: false
        default: ""
      bt_min_dollar_vol:
        description: "تجربة C (اختياري): تجاوز أرضية السيولة MIN_DOLLAR_VOL (200K$) — باكتيست فقط"
        required: false
        default: ""
      bt_sweep_entry:
        description: "تجربة T1 «الدخول المؤكَّد بالمسح» (اختياري): 1 = فعّلها (دخول بعد مسح تحت الدعم ثم استعادة، بدل التعبئة الفورية). يقارن على نفس الإشارة ويحكم على المُعبَّأة فقط. باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_sweep_stop:
        description: "تجربة T1 (اختياري): 0 = وقف الأساس (يعزل أثر الدخول — موصى) · 1 = وقف تحت ذيل المسح (يخلط الدخول بتعميق الوقف الذي فشل حيًّا)"
        required: false
        default: ""
      bt_sweep_pct:
        description: "تجربة T1 (اختياري): عمق المسح المطلوب تحت الدعم (افتراضي 0.10 = 10%). امسح {0.05,0.08,0.10,0.12} لاختبار ثبات الإشارة"
        required: false
        default: ""
      bt_sweep_min_rr:
        description: "تجربة T1 (اختياري): أرضية العائد/المخاطرة لقبول تعبئة المسح (افتراضي 1.0)"
        required: false
        default: ""
      bt_spread_pct:
        description: "🔬 F-COST (اختياري): تكلفة تنفيذ (سبريد+انزلاق) بالكسر — مثال 0.03 = 3%. فارغ/0 = صفر تكلفة (سلوك اليوم). امسح {0.01,0.03,0.05} لاختبار «عند أي سبريد تنكسر الحافة؟». باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_potential:
        description: "🏦 قوة البوت (اختياري): 1 = قِس أقصى صعود من الدخول **قبل الوقف** لكل سهم + كم انفجر من المجمل (المحور الحقيقي — الأهداف تمهيدية). باكتيست فقط"
        required: false
        default: ""
      bt_portfolio:
        description: "🏦 محاكاة الانتقائية (اختياري): 1 = محفظة top-N بالترتيب (readiness→score) بجانب «كل المُعبَّئين» — هل الانتقائية تضيف؟ يلزم bt_potential=1. باكتيست فقط"
        required: false
        default: ""
      bt_port_size:
        description: "🏦 سعة المحفظة المحاكاة (اختياري): افتراضي 15 (= WATCHLIST_SIZE). باكتيست فقط"
        required: false
        default: ""
      bt_raw_price:
        description: "🕰️ (متقادم — لا يُلغي التقسيمات) point-in-time خام: auto_adjust=False. استخدم frozen_run_id بدلًا منه للتجميد الصحيح"
        required: false
        default: ""
      frozen_run_id:
        description: "🕰️ التجميد الصحيح (موصى): run-id لتشغيلة «Freeze backtest dataset» لتحميل لقطتها المجمَّدة → باكتيست قابل لإعادة الإنتاج 100% + يرفض الوهميات (تعديل تقسيم مستقبلي). فارغ = تحميل حيّ متغيّر"
        required: false
        default: ""
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # وضع السوق الكامل أثقل (جلب ~3500 رمز + مشي شهري)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download frozen dataset (point-in-time reproducibility)
        if: ${{ github.event.inputs.frozen_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: frozen-dataset
          run-id: ${{ github.event.inputs.frozen_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCREENER_MODE: BACKTEST
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols }}
          BACKTEST_MONTH: ${{ github.event.inputs.month }}
          BACKTEST_YEAR: ${{ github.event.inputs.year }}
          # B1: مفاتيح تجربة A/B — تُقرأ في وضع BACKTEST حصريًا (الإنتاج محصّن بقفل اختبار)
          BT_BASE_RANGE_MAX: ${{ github.event.inputs.bt_base_range_max }}
          BT_MIN_DROP_FLOOR: ${{ github.event.inputs.bt_min_drop_floor }}
          BT_MAX_DROP_PCT: ${{ github.event.inputs.bt_max_drop_pct }}
          BT_SPIKE_WINDOW: ${{ github.event.inputs.bt_spike_window }}
          BT_MIN_DOLLAR_VOL: ${{ github.event.inputs.bt_min_dollar_vol }}
          # T1: تجربة الدخول المؤكَّد بالمسح — تُقرأ في وضع BACKTEST حصريًا
          BT_SWEEP_ENTRY: ${{ github.event.inputs.bt_sweep_entry }}
          BT_SWEEP_STOP: ${{ github.event.inputs.bt_sweep_stop }}
          BT_SWEEP_PCT: ${{ github.event.inputs.bt_sweep_pct }}
          BT_SWEEP_MIN_RR: ${{ github.event.inputs.bt_sweep_min_rr }}
          # 🔬 F-COST: تكلفة التنفيذ (سبريد+انزلاق) — تُقرأ في وضع BACKTEST حصريًا
          BT_SPREAD_PCT: ${{ github.event.inputs.bt_spread_pct }}
          # 🏦 قوة البوت + الانتقائية — تُقرأ في وضع BACKTEST حصريًا (الإنتاج محصّن بقفل B1)
          BT_POTENTIAL: ${{ github.event.inputs.bt_potential }}
          BT_PORTFOLIO: ${{ github.event.inputs.bt_portfolio }}
          BT_PORT_SIZE: ${{ github.event.inputs.bt_port_size }}
          # 🕰️ point-in-time (تدقيق خارجي) — يُقرأ في وضع BACKTEST حصريًا
          BT_RAW_PRICE: ${{ github.event.inputs.bt_raw_price }}
          # 🕰️ التجميد الصحيح: لو frozen_run_id مُعطى → حُمِّلت اللقطة، فاقرأها (قابل لإعادة الإنتاج)
          BT_FROZEN_PATH: ${{ github.event.inputs.frozen_run_id != '' && 'frozen_backtest.pkl.gz' || '' }}
        run: python Super_stock.py
      - name: Upload backtest CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_*.csv
          if-no-files-found: ignore
