name: Backtest (historical)
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "رموز مفصولة بفاصلة (مثال: NGEN,SMX,VEEE). فارغ = كون البوت (القائمة + التنبيهات) فيكفي تحديد الشهر وحده"
        required: false
        default: ""
      month:
        description: "شهر تقويمي محدّد (اختياري): 1=يناير … 12=ديسمبر — يفحص إشارات ذلك الشهر فقط (آخر سنة متوفّرة). فارغ = كل التاريخ"
        required: false
        default: ""
      bt_base_range_max:
        description: "تجربة B1 (اختياري): تجاوز BASE_RANGE_MAX_PCT — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_min_drop_floor:
        description: "تجربة B1 (اختياري): تجاوز MIN_DROP_FLOOR — باكتيست فقط، لا يمسّ الإنتاج"
        required: false
        default: ""
      bt_max_drop_pct:
        description: "تجربة C (اختياري): تجاوز سقف الانهيار MAX_DROP_PCT (97) — باكتيست فقط"
        required: false
        default: ""
      bt_spike_window:
        description: "تجربة C (اختياري): تجاوز نافذة سرعة الانفجار PRIOR_SPIKE_WINDOW (20ج) — باكتيست فقط"
        required: false
        default: ""
      bt_min_dollar_vol:
        description: "تجربة C (اختياري): تجاوز أرضية السيولة MIN_DOLLAR_VOL (200K$) — باكتيست فقط"
        required: false
        default: ""
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCREENER_MODE: BACKTEST
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols }}
          BACKTEST_MONTH: ${{ github.event.inputs.month }}
          # B1: مفاتيح تجربة A/B — تُقرأ في وضع BACKTEST حصريًا (الإنتاج محصّن بقفل اختبار)
          BT_BASE_RANGE_MAX: ${{ github.event.inputs.bt_base_range_max }}
          BT_MIN_DROP_FLOOR: ${{ github.event.inputs.bt_min_drop_floor }}
          BT_MAX_DROP_PCT: ${{ github.event.inputs.bt_max_drop_pct }}
          BT_SPIKE_WINDOW: ${{ github.event.inputs.bt_spike_window }}
          BT_MIN_DOLLAR_VOL: ${{ github.event.inputs.bt_min_dollar_vol }}
        run: python Super_stock.py
      - name: Upload backtest CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_*.csv
          if-no-files-found: ignore
