name: Polygon Health (فحص الاشتراك)

# 🩺 يفحص منافذ Polygon الثلاثة التي يعتمدها البوت (صفقات تاريخية · دقائق · NBBO
# لحظي) ويرسل الحكم لتلغرام + السجل. فحص/عرض فقط — لا يلمس الفرز ولا الحالة.

on:
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Polygon health check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python polygon_health.py
