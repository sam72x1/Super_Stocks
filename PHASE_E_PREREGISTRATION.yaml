# ═══════════════════════════════════════════════════════════════════════════
# Phase E — فرضيات مسجَّلة مسبقًا (قبل رؤية أي نتيجة) — منع p-hacking
# ═══════════════════════════════════════════════════════════════════════════
# التاريخ: 2026-07-13 · بعد Phase C (لا شيء ينجو على الشمعة اليومية).
# طلب المستخدم: «أدقّ من الشمعة اليومية — 4س أو خارج الشموع». ثلاثة محاور:
#   E1 = شمعة 4 ساعات · E2 = حافة التوقيت الحيّة · E3 = نظام السوق (خارج الشموع).
# اللقطة المرجعية: as-of 2026-07-13 · SHA aac35221 · 3365 رمز (يومي).
# ⚠️ لا يُعدَّل بعد رؤية النتائج. الأعمدة من تفريغ الباكتيست (bt_dump_dataset=1 + bt_dump_4h=1).

principles:
  target: "الانفجار = fwd_max_gain >= 50 (على المُعبَّأة). النجاح على المحسومة."
  walk_forward: "ثنيتان مستقلتان (2025 · 2026) — الاتجاه يجب أن يتّسق."
  significance: "Fisher (ثنائي) / Mann-Whitney (مستمر) ثم Benjamini-Hochberg FDR عبر عائلة E؛ q<0.10."
  effect: "فرق مطلق ذو معنى + فاصل Wilson لا يلمس صفر الفرق."
  tercile_rule: "الشرائح النسبية (أعلى/أدنى ثلث) تُحسب على المُعبَّأة داخل كل ثنية اختبار (لا تسرّب)."

# ── E2: حافة التوقيت الحيّة (رادار الانطلاق) ────────────────────────────────
E2_live_timing:
  status: "غير قابل للقياس بعد (2026-07-13)."
  reason: "ignition_log.json = سجل واحد فقط (GEOS 2026-07-09). يلزم >=8 محسومة (IGNITION_OUTCOME_MIN) لقياس الالتقاط/الإنذار الكاذب."
  decision: "الحلقة مبنية (_ignition_log_block/_ignition_outcome) وتتراكم حيًّا. لا حكم الآن — صدق لا تخمين."

# ── E1: شمعة 4 ساعات (هل أدقّ من اليومية؟) ──────────────────────────────────
E1_four_hour:
  precondition_coverage:
    metric: "نسبة المُعبَّئين الذين توفّرت لهم >=10 شمعة 4س تاريخية (h4_bars>=10)."
    rule: "إن كانت التغطية < 50% من المُعبَّئين → E1 غير قابل للاختبار (جدار بيانات: yfinance 1h محدود تاريخيًّا للمايكروكاب). يُسجَّل كنتيجة صادقة: 4س حافة حيّة فقط."
  hypotheses:
    - id: H_4H_REVERSAL
      population: filled_with_h4          # h4_bars>=10
      rule: "h4_reversal == True"
      target: "fwd_max_gain >= 50"
      direction: positive
      rationale: "انعكاس 4س عند الإشارة (فيصل: تأكيد فريم أدقّ) قد يميّز المنفجر الذي تخطئه اليومية."
    - id: H_4H_RSI_LOW
      population: filled_with_h4
      rule: "h4_rsi <= 35"
      target: "fwd_max_gain >= 50"
      direction: positive
      rationale: "تشبّع بيعي 4س أعمق = زنبرك أقرب."

# ── E3: نظام السوق / خارج الشموع (على المجمَّد اليومي) ───────────────────────
E3_regime:
  hypotheses:
    - id: H_DROP_DEEP
      population: all_filled
      rule: "drop_pct في أعلى ثلث (الانهيار الأعمق)"
      target: "fwd_max_gain >= 50"
      direction: positive
      rationale: "فيصل: الانهيار الأعمق = فلوت أصغر/تشبّع أكبر = انفجار أقوى."
    - id: H_SPIKE_BIG
      population: all_filled
      rule: "best_spike في أعلى ثلث (الانفجار السابق الأكبر)"
      target: "fwd_max_gain >= 50"
      direction: positive
      rationale: "انفجار سابق أكبر = اهتمام مضاربي مثبت = أرجح للتكرار."
    - id: H_RR_HIGH
      population: all_filled
      rule: "rr في أعلى ثلث (أعلى عائد/مخاطرة)"
      target: "fwd_max_gain >= 50"
      direction: positive
      rationale: "مسافة أكبر للهدف قبل الوقف = مجال أوسع للانفجار."
    - id: H_MONTH_REGIME
      population: all_filled
      test: "chi-square: هل معدّل الانفجار يختلف جوهريًّا بين أرباع السنة؟ (استكشافي — نظام سوق لا قاعدة اختيار)"
      direction: exploratory

# ── معيار القبول (مقفول) ────────────────────────────────────────────────────
acceptance:
  survive: "(اتجاه متّسق بالسنتين) و (q<0.10 بعد FDR على عائلة E) و (فرق ذو معنى + Wilson لا يلمس صفر)."
  governance: "أي ناجٍ → مراجعة خصومية 3 عدسات + أقفال getsource + موافقة المستخدم صريحة قبل أي مسّ إنتاج."
  honest_expectation: "العيّنة صغيرة (~124 مُعبَّأة/سنتين). الأرجح لا شيء ينجو — يتّسق مع حكم السنتين (الحافة التوقيت لا الفرز). القيمة = إغلاق موثَّق لسؤال «أدقّ من اليومية» بمعيار صارم."

excluded:
  - "أي فرضية تُبتكر بعد رؤية النتائج (تُسجَّل بتاريخ جديد وتُختبر على فترة أخرى)."
  - "عصر عتبات (35→40 RSI، ثلث→ربع) بعد الفشل."
  - "أي تغيير إنتاجي بلا نجاة + موافقة صريحة."
